<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BR-Captcha</title>
  <meta name="description" content="Solve CAPTCHAs to prove your humanity once and for all.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="header-title">
        <img src="assets/title.png" alt="Colorful BR-Captcha logo with the text CPF na Nota and a large green check mark, shown on a clean white background with festive confetti-like accents and a cheerful tone" style="width: 50%; max-width: 100px; height: auto; margin-top: 2rem;">
        <div id="header-level">Nivel 1: Checkbox</div>
      </div>
    </header>

    <main id="content"></main>

    <footer id="footer">
      <div id="footer-reset">Resetar</div>
      <div id="footer-text">Made by Love <span style="font-size:12px;opacity:.5;position:relative;top:-2px">(Humano ou nao?)</span></div>
    </footer>

  </div>

  <!-- Reset Modal -->
  <div id="modal-overlay">
    <div id="modal-bg"></div>
    <div id="modal-box">
      <h2>Tem certeza de que deseja recomeçar?</h2>
      <div class="modal-btns">
        <button class="modal-btn cancel" id="modal-cancel">Cancelar</button>
        <button class="modal-btn" id="modal-reset">Recomeçar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>

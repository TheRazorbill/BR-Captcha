<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>I'm Not a Robot</title>
  <meta name="description" content="Solve CAPTCHAs to prove your humanity once and for all.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="header-title">
        <img src="assets/title.svg" alt="I'm Not a Robot">
        <div id="header-level">Level 1: Checkbox</div>
      </div>
    </header>

    <main id="content"></main>

    <footer id="footer">
      <div id="footer-reset">Reset</div>
      <div id="footer-text">Made by Neal <span style="font-size:12px;opacity:.5;position:relative;top:-2px">(human)</span></div>
    </footer>

  </div>

  <!-- Reset Modal -->
  <div id="modal-overlay">
    <div id="modal-bg"></div>
    <div id="modal-box">
      <h2>Are you sure you want to start over?</h2>
      <div class="modal-btns">
        <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn" id="modal-reset">Start Over</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
